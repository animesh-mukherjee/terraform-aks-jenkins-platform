# =============================================================================
# jenkins/casc/credentials.yaml
#
# JCasC file 4 of 6 — Jenkins credential store.
#
# Defines four credentials that Jenkinsfiles consume via `withCredentials {}`:
#   acr-credentials              → usernamePassword  (Docker push in Stage 3)
#   acr-login-server             → string            (docker tag/push target)
#   postgresql-connection-string → string            (DB migration ACI, Stage 4)
#   service-bus-connection-string → string           (event publish, Stage 7)
#
# All values use ${VAR_NAME} interpolation. The environment variables are
# injected into the Jenkins controller pod from two K8s Secrets via the
# containerEnv block in helm/jenkins/values.yaml:
#   jenkins-pipeline-creds  → ACR_USERNAME, ACR_PASSWORD, ACR_LOGIN_SERVER,
#                              POSTGRESQL_CONNECTION_STRING
#   service-bus-credentials → SERVICE_BUS_CONNECTION_STRING
#
# Both K8s Secrets are created by terraform/k8s-post/ from Key Vault data
# sources — the secrets are never hardcoded in any file that touches git.
#
# How to use in a Jenkinsfile:
#   withCredentials([
#     usernamePassword(
#       credentialsId: 'acr-credentials',
#       usernameVariable: 'DOCKER_USER',
#       passwordVariable: 'DOCKER_PASS'
#     ),
#     string(credentialsId: 'acr-login-server', variable: 'ACR_SERVER')
#   ]) {
#     sh 'docker login $ACR_SERVER -u $DOCKER_USER -p $DOCKER_PASS'
#     sh 'docker push $ACR_SERVER/my-app:$BUILD_NUMBER'
#   }
# =============================================================================

credentials:
  system:
    domainCredentials:
      - credentials:
          # ── ACR username + password ──────────────────────────────────────
          # Used in Stage 3 (Docker Build + Push) to authenticate against
          # Azure Container Registry.
          # ACR admin credentials are enabled on the ACR resource
          # (admin_enabled = true in terraform/modules/acr/main.tf).
          # PROD: disable ACR admin and use Managed Identity + AcrPush role
          # assignment instead (no credentials needed in pipeline).
          - usernamePassword:
              scope: GLOBAL
              id: "acr-credentials"
              description: "ACR admin credentials — docker login for image push (Stage 3)"
              username: "${ACR_USERNAME}"
              password: "${ACR_PASSWORD}"

          # ── ACR login server URL ─────────────────────────────────────────
          # The registry hostname (e.g. myacr.azurecr.io). Used in docker tag
          # and docker push commands so the image name includes the full
          # registry path. Stored as a secret string even though it is not
          # sensitive — it prevents hardcoding the randomly-suffixed ACR name
          # in Jenkinsfiles.
          - string:
              scope: GLOBAL
              id: "acr-login-server"
              description: "ACR login server hostname — e.g. myacr1a2b3c.azurecr.io"
              secret: "${ACR_LOGIN_SERVER}"

          # ── PostgreSQL connection string ─────────────────────────────────
          # Full libpq URI consumed by the ACI migration runner in Stage 4.
          # Jenkins passes it to the Container Instance as a secure env var
          # (az container create --secure-environment-variables).
          # Format: postgresql://user:password@host:5432/dbname?sslmode=require
          - string:
              scope: GLOBAL
              id: "postgresql-connection-string"
              description: "PostgreSQL connection string for DB migration ACI (Stage 4)"
              secret: "${POSTGRESQL_CONNECTION_STRING}"

          # ── Service Bus SAS connection string ─────────────────────────────
          # Primary SAS key for the Service Bus namespace. Used in Stage 7 to
          # publish build/deploy event messages to the build-events and
          # deploy-events queues.
          # Format: Endpoint=sb://...;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=...
          - string:
              scope: GLOBAL
              id: "service-bus-connection-string"
              description: "Service Bus SAS connection string for event notifications (Stage 7)"
              secret: "${SERVICE_BUS_CONNECTION_STRING}"
