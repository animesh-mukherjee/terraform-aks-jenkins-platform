# jenkins-serviceaccount.yaml
#
# Creates the ServiceAccount that the Jenkins controller pod runs as.
# The Kubernetes plugin uses this identity when calling the K8s API to
# create and delete dynamic agent pods. The ClusterRole and ClusterRoleBinding
# in jenkins-clusterrole.yaml bind this ServiceAccount to the necessary permissions.
#
# Applied by: kubectl apply -k k8s/rbac/
# Namespace:  jenkins (created by terraform/k8s-post/)
#
# Helm wiring (helm/jenkins/values.yaml):
#   serviceAccount:
#     create: false          # Do not create a new SA; use this pre-existing one
#     name: jenkins-sa       # Must match metadata.name below
#
# JCasC wiring (jenkins/casc/clouds.yaml):
#   serviceAccount: jenkins-sa   # Pod template SA for agent pods

apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-sa
  namespace: jenkins
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/component: serviceaccount
    app.kubernetes.io/managed-by: kubectl
